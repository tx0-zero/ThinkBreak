name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Validate Bash, manifests, Recipes, and lifecycle behavior
        run: ./scripts/validate.sh
      - name: Package source release
        run: ./scripts/package-release.sh
      - name: Verify source archive and checksum
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          (cd dist && shasum -a 256 -c "ThinkBreak-$VERSION.zip.sha256")
          unzip -l "dist/ThinkBreak-$VERSION.zip" | grep -q 'plugins/thinkbreak/hooks/dispatch.sh'
      - name: Check working tree
        run: |
          git diff --check
          test -z "$(git status --short --untracked-files=no)"
