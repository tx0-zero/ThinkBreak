name: Bug report / 错误报告
description: Report a reproducible ThinkBreak problem
title: "[Bug] "
labels: [bug]
body:
  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and removed private URLs, tokens, and account data.
          required: true
  - type: input
    attributes:
      label: ThinkBreak version
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    attributes:
      label: Environment
      placeholder: macOS version, Chrome version, Codex and/or Claude Code version
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Use a public or redacted URL.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    attributes:
      label: Actual behavior and logs
      description: Remove personal paths, URLs, prompts, tokens, and account information.
    validations:
      required: true
